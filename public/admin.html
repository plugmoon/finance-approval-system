<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>凱凱/亞太/鋼鐵人 三合一財務審核系統</title>
    <link rel="stylesheet" href="/css/styles.css?v=20260621-profile-categories">
    <script defer src="/js/admin.js?v=20260621-profile-categories"></script>
  </head>
  <body class="admin-body">
    <header class="topbar">
      <a class="brand" href="/">凱凱/亞太/鋼鐵人 三合一財務審核系統</a>
      <nav class="topnav" aria-label="主要導覽">
        <a href="/">員工申請</a>
        <a class="active" href="/admin">後台管理</a>
      </nav>
      <div class="session-box" id="sessionBox" hidden>
        <span id="sessionName"></span>
        <button class="ghost-button compact" type="button" id="logoutButton">登出</button>
      </div>
    </header>

    <main class="admin-shell">
      <section class="auth-panel" id="loginView">
        <form id="loginForm" class="auth-box">
          <h1>後台登入</h1>
          <label>
            <span>帳號</span>
            <input name="username" type="text" autocomplete="username" required>
          </label>
          <label>
            <span>密碼</span>
            <input name="password" type="password" autocomplete="current-password" required>
          </label>
          <button class="primary-button" type="submit">登入</button>
          <p class="form-message" id="loginMessage" role="alert"></p>
        </form>
      </section>

      <section id="adminApp" hidden>
        <div class="admin-tabs" id="adminTabs" role="tablist" aria-label="後台功能">
          <button class="tab-button active" type="button" data-tab="dashboard" data-admin-only hidden>總覽</button>
          <button class="tab-button" type="button" data-tab="requests">財務申請清單</button>
          <button class="tab-button" type="button" data-tab="profile">個人資料</button>
          <button class="tab-button" type="button" data-tab="employees" data-admin-only hidden>員工權限</button>
          <button class="tab-button" type="button" data-tab="settings" data-admin-only hidden>設定</button>
        </div>

        <section class="tab-panel" id="dashboardPanel">
          <div class="metric-grid" id="metricGrid"></div>
        </section>

        <section class="tab-panel profile-layout" id="profilePanel" hidden>
          <section class="work-surface">
            <div class="panel-heading">
              <h2>個人資料與帳號密碼</h2>
            </div>
            <form id="profileForm" class="admin-form" novalidate>
              <label>
                <span>員工編號</span>
                <input name="employee_no" type="text" disabled>
              </label>
              <label>
                <span>權限</span>
                <input name="role_label" type="text" disabled>
              </label>
              <label>
                <span>姓名</span>
                <input name="name" type="text" maxlength="80" required>
              </label>
              <label>
                <span>部門</span>
                <input name="department" type="text" maxlength="80">
              </label>
              <label class="wide">
                <span>所屬單位</span>
                <input name="unit_names" type="text" disabled>
              </label>
              <label>
                <span>登入帳號</span>
                <input name="account" type="text" maxlength="80" autocomplete="username" required>
              </label>
              <label>
                <span>新密碼</span>
                <input name="password" type="password" maxlength="200" autocomplete="new-password" placeholder="不修改可留空">
              </label>
              <div class="form-actions wide">
                <button class="primary-button" type="submit">儲存個人資料</button>
                <p class="form-message" id="profileMessage" role="status"></p>
              </div>
            </form>
          </section>
        </section>

        <section class="tab-panel admin-layout" id="requestsPanel" hidden>
          <section class="work-surface admin-editor" id="requestEditorPanel" hidden>
            <div class="panel-heading">
              <h2 id="requestFormTitle">新增財務紀錄</h2>
              <button class="ghost-button compact" type="button" id="resetRequestButton">新資料</button>
            </div>
            <form id="requestForm" class="admin-form" novalidate>
              <input type="hidden" name="id">
              <label data-admin-only>
                <span>申請員工</span>
                <select name="employee_id" id="adminEmployeeSelect" required></select>
              </label>
              <label>
                <span>申請歸屬單位</span>
                <select name="unit_id" id="adminRequestUnitSelect" required></select>
              </label>
              <label data-admin-only>
                <span>狀態</span>
                <select name="status">
                  <option value="pending">待審核</option>
                  <option value="approved">已同意</option>
                  <option value="rejected">不同意</option>
                </select>
              </label>
              <label>
                <span>費用類別</span>
                <select name="category_id" id="adminCategorySelect" required></select>
              </label>
              <label>
                <span>申請金額</span>
                <input name="amount" type="number" min="1" step="1" required>
              </label>
              <label>
                <span>發生日期</span>
                <input name="occurred_on" type="date" required>
              </label>
              <label class="wide">
                <span>申請項目</span>
                <input name="expense_item" type="text" maxlength="120" required>
              </label>
              <label class="wide">
                <span>內容描述</span>
                <textarea name="description" rows="4" maxlength="1500" required></textarea>
              </label>
              <label class="wide">
                <span>備註</span>
                <textarea name="note" rows="3" maxlength="1500"></textarea>
              </label>
              <label class="wide" data-admin-only>
                <span>不同意理由</span>
                <textarea name="rejection_reason" rows="3" maxlength="800"></textarea>
              </label>
              <label class="wide">
                <span>發票照片</span>
                <input name="invoice_file" id="adminInvoiceInput" type="file" accept="image/*" capture="environment">
              </label>
              <div class="invoice-preview wide" id="adminInvoicePreview">可在新增或編輯時上傳發票照片。</div>
              <div class="form-actions wide">
                <button class="primary-button" type="submit">儲存</button>
                <p class="form-message" id="requestMessage" role="status"></p>
              </div>
            </form>
            <section class="embedded-manager" data-admin-only>
              <div class="panel-heading compact-heading">
                <h3 id="categoryFormTitle">新增費用類別</h3>
                <button class="ghost-button compact" type="button" id="resetCategoryButton">新資料</button>
              </div>
              <form id="categoryForm" class="inline-form" novalidate>
                <input type="hidden" name="id">
                <label>
                  <span>類別名稱</span>
                  <input name="name" type="text" maxlength="80" required>
                </label>
                <button class="primary-button" type="submit">儲存</button>
                <p class="form-message" id="categoryMessage" role="status"></p>
              </form>
              <div class="table-wrap compact-table">
                <table>
                  <thead>
                    <tr>
                      <th>費用類別</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody id="categoryRows"></tbody>
                </table>
              </div>
            </section>
          </section>

          <section class="work-surface admin-list">
            <div class="panel-heading">
              <h2>財務申請清單</h2>
              <a class="secondary-link" id="exportLink" href="/api/admin/export.csv" hidden>匯出 CSV</a>
            </div>
            <div class="admin-tools">
              <input id="requestKeyword" type="search" placeholder="搜尋姓名、項目、內容">
              <select id="requestStatus">
                <option value="">全部狀態</option>
                <option value="pending">待審核</option>
                <option value="approved">已同意</option>
                <option value="rejected">不同意</option>
              </select>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>申請單</th>
                    <th>申請人</th>
                    <th>單位 / 部門</th>
                    <th>項目</th>
                    <th>金額</th>
                    <th>狀態</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="requestRows"></tbody>
              </table>
            </div>
          </section>
        </section>

        <section class="tab-panel admin-layout" id="employeesPanel" hidden>
          <section class="work-surface admin-editor">
            <div class="panel-heading">
              <h2 id="employeeFormTitle">新增員工</h2>
              <button class="ghost-button compact" type="button" id="resetEmployeeButton">新資料</button>
            </div>
            <form id="employeeForm" class="admin-form" novalidate>
              <input type="hidden" name="id">
              <label>
                <span>員工編號</span>
                <input name="employee_no" type="text" maxlength="40" required>
              </label>
              <label>
                <span>員工姓名</span>
                <input name="name" type="text" maxlength="80" required>
              </label>
              <label>
                <span>單位</span>
                <select name="unit_ids" id="employeeUnitSelect" multiple size="4" required></select>
              </label>
              <label>
                <span>部門</span>
                <input name="department" type="text" maxlength="80">
              </label>
              <label>
                <span>權限</span>
                <select name="role">
                  <option value="employee">員工</option>
                  <option value="admin">管理員</option>
                </select>
              </label>
              <label>
                <span>狀態</span>
                <select name="status">
                  <option value="active">啟用</option>
                  <option value="inactive">停用</option>
                </select>
              </label>
              <label>
                <span>登入帳號</span>
                <input name="account" type="text" maxlength="80" autocomplete="off">
              </label>
              <label class="wide">
                <span>登入密碼</span>
                <input name="password" type="password" maxlength="200" autocomplete="new-password">
              </label>
              <div class="form-actions wide">
                <button class="primary-button" type="submit">儲存</button>
                <p class="form-message" id="employeeMessage" role="status"></p>
              </div>
            </form>
          </section>

          <section class="work-surface admin-list">
            <div class="panel-heading">
              <h2>員工清單</h2>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>編號</th>
                    <th>姓名</th>
                    <th>單位 / 部門</th>
                    <th>權限</th>
                    <th>狀態</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="employeeRows"></tbody>
              </table>
            </div>
          </section>
        </section>

        <section class="tab-panel settings-grid" id="settingsPanel" hidden>
          <section class="work-surface">
            <div class="panel-heading">
              <h2 id="unitFormTitle">新增單位</h2>
              <button class="ghost-button compact" type="button" id="resetUnitButton">新資料</button>
            </div>
            <form id="unitForm" class="inline-form" novalidate>
              <input type="hidden" name="id">
              <label>
                <span>單位名稱</span>
                <input name="name" type="text" maxlength="80" required>
              </label>
              <button class="primary-button" type="submit">儲存</button>
              <p class="form-message" id="unitMessage" role="status"></p>
            </form>
            <div class="table-wrap compact-table">
              <table>
                <thead>
                  <tr>
                    <th>單位</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="unitRows"></tbody>
              </table>
            </div>
          </section>

          <section class="work-surface">
            <div class="panel-heading">
              <h2>Email 通知設定</h2>
            </div>
            <form id="notificationForm" class="admin-form" novalidate>
              <label class="wide">
                <span>通知收件 Email</span>
                <textarea name="email_recipients" rows="7" maxlength="2000" placeholder="boss@example.com&#10;accounting@example.com"></textarea>
              </label>
              <p class="wide helper-text">可輸入多個 Email，每行一個或用逗號分隔。SMTP 主機、帳號與寄件人請在伺服器 .env 設定。</p>
              <label>
                <span>SMTP 狀態</span>
                <input name="smtp_status" type="text" disabled>
              </label>
              <label>
                <span>寄件人</span>
                <input name="smtp_from" type="text" disabled>
              </label>
              <div class="form-actions wide">
                <button class="primary-button" type="submit">儲存 Email 通知設定</button>
                <p class="form-message" id="notificationMessage" role="status"></p>
              </div>
            </form>
          </section>
        </section>
      </section>
    </main>
  </body>
</html>
