<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>凱凱/亞太/鋼鐵人 三合一財務審核系統</title>
    <link rel="stylesheet" href="/css/styles.css?v=20260702-result-mode-v2">
    <script defer src="/js/app.js?v=20260702-result-mode-v2"></script>
  </head>
  <body class="request-mode">
    <header class="topbar">
      <a class="brand" href="/">凱凱/亞太/鋼鐵人 三合一財務審核系統</a>
      <nav class="topnav" aria-label="主要導覽">
        <a class="active" href="/">員工申請</a>
        <a href="/admin">後台管理</a>
      </nav>
    </header>

    <main class="page-shell" id="frontPage">
      <section class="work-surface" id="requestSection">
        <div class="surface-heading">
          <div>
            <p class="eyebrow">Expense Request</p>
            <h1>費用申請表</h1>
          </div>
          <span class="state-pill" id="loadState">讀取中</span>
        </div>

        <form id="expenseForm" class="request-form" novalidate>
          <label>
            <span>申請員工</span>
            <select name="employee_id" id="employeeSelect" required>
              <option value="">請選擇員工</option>
            </select>
          </label>

          <label>
            <span>費用類別</span>
            <select name="category_id" id="categorySelect" required>
              <option value="">請選擇類別</option>
            </select>
          </label>

          <div class="employee-context wide" id="employeeContext">請先選擇申請員工，系統會帶入所屬單位與部門。</div>

          <label>
            <span>申請歸屬單位</span>
            <select name="unit_id" id="requestUnitSelect" required>
              <option value="">請先選擇員工</option>
            </select>
          </label>

          <label>
            <span>申請金額</span>
            <input name="amount" type="number" min="1" step="1" inputmode="decimal" placeholder="0" required>
          </label>

          <label>
            <span>發生日期</span>
            <input name="occurred_on" id="occurredOn" type="date" required>
          </label>

          <label class="wide">
            <span>申請項目</span>
            <input name="expense_item" type="text" maxlength="120" placeholder="例：外送平台物料採購" required>
          </label>

          <label class="wide">
            <span>內容描述</span>
            <textarea name="description" rows="5" maxlength="1500" placeholder="請填寫用途、對象、必要背景" required></textarea>
          </label>

          <label class="wide">
            <span>備註</span>
            <textarea name="note" rows="3" maxlength="1500" placeholder="可填發票號碼、付款方式或其他補充"></textarea>
          </label>

          <div class="invoice-mode-field wide">
            <span class="field-label">發票照片</span>
            <div class="invoice-mode-actions" role="group" aria-label="發票照片來源">
              <button class="invoice-mode-button" type="button" data-invoice-mode="camera">拍攝照片</button>
              <button class="invoice-mode-button" type="button" data-invoice-mode="upload">上傳發票</button>
            </div>
            <div class="invoice-source-panel" id="invoiceCameraPanel" hidden>
              <label>
                <span>開啟相機拍攝發票</span>
                <input id="invoiceCameraInput" type="file" accept="image/*" capture="environment">
              </label>
            </div>
            <div class="invoice-source-panel" id="invoiceUploadPanel" hidden>
              <label>
                <span>從手機相簿選擇發票照片</span>
                <input name="invoice_file" id="invoiceInput" type="file">
              </label>
            </div>
          </div>
          <div class="invoice-preview wide" id="invoicePreview">請先選擇拍攝照片或上傳發票。</div>

          <div class="form-actions wide">
            <button class="primary-button" type="submit" id="submitButton">送出申請</button>
            <button class="ghost-button" type="reset">清除</button>
          </div>
        </form>
      </section>

      <aside class="side-panel result-page" id="resultSection" aria-live="polite" hidden>
        <div class="panel-heading">
          <h2 id="resultTitle" tabindex="-1">送出結果</h2>
        </div>
        <div id="submitResult" class="empty-state">
          尚未送出申請。
        </div>
        <div class="result-actions">
          <button class="ghost-button" type="button" id="newRequestButton">填寫下一筆申請</button>
        </div>
      </aside>
    </main>
  </body>
</html>
